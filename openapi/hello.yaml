 openapi: "3.0.3"
 info:
   title: Recipe API
   version: "0.1.0"

 paths:
   /hello:
     get:
       summary: "Hello Worldを返す"
       operationId: getHello
       responses:
         "200":
           description: "成功"
           content:
             application/json:
               schema:
                 type: object
                 required:
                   - message
                 properties:
                   message:
                     type: string
                     example: "Hello, World"
