type: object
required:
  - id
  - name
  - created_at
  - updated_at

properties:
  id:
    type: integer
    format: int64
    readOnly: true

  name:
    type: string
    maxLength: 255

  description:
    type: string
    nullable: true

  created_at:
    type: string
    format: date-time
    readOnly: true

  updated_at:
    type: string
    format: date-time
    readOnly: true
